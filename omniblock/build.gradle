plugins {
    id 'java'
    id 'net.neoforged.gradle.userdev' version '7.0.145'
}

version = '1.0.0'
group = 'com.omniblock'

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

runs {
    client {
        client()
        systemProperty 'forge.enabledGameTestNamespaces', 'omniblock'
    }
    server {
        server()
        programArgument '--nogui'
        systemProperty 'forge.enabledGameTestNamespaces', 'omniblock'
    }
}

dependencies {
    implementation "net.neoforged:neoforge:21.1.81"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

jar {
    manifest {
        attributes([
            'Specification-Title'   : 'omniblock',
            'Specification-Vendor'  : 'omniblock',
            'Specification-Version' : '1',
            'Implementation-Title'  : project.name,
            'Implementation-Version': project.jar.archiveVersion,
            'Implementation-Vendor' : 'omniblock'
        ])
    }
}
